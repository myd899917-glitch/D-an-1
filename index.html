<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Mỹ Diệu</title>

<style>
    body {
        margin: 0;
        font-family: Arial;
        background: #f5f5f5;
    }

    .container {
        width: 800px;
        margin: 30px auto;
        background: white;
        border: 2px solid #999;
    }

    header {
        text-align: center;
        color: white;
        padding: 40px 20px;
        border-bottom: 2px solid #999;
        position: relative;
        overflow: hidden;
    }

    header img {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        object-fit: cover;
        z-index: 0;
    }

    header h1 {
        position: relative;
        z-index: 1;
        background: rgba(0,0,0,0.4);
        display: inline-block;
        padding: 10px 20px;
        border-radius: 10px;
    }

    .menu {
        display: flex;
        border-bottom: 2px solid #999;
    }

    .menu div {
        flex: 1;
        text-align: center;
        padding: 10px;
        border-right: 1px solid #999;
    }

    .menu div:last-child {
        border-right: none;
    }

    .section {
        display: flex;
        align-items: center;
        padding: 20px;
        border-bottom: 2px solid #999;
    }

    .img-box {
        width: 150px;
        height: 150px;
        border: 2px solid black;
        margin-right: 20px;
        overflow: hidden;
    }

    .img-box img {
        width: 100%;
        height: 100%;
        object-fit: cover; /* ảnh tự fit đẹp */
    }

    .info {
        flex: 1;
        line-height: 1.8;
    }

    .hobby {
        text-align: center;
        padding: 30px 20px;
        border-bottom: 2px solid #999;
        font-weight: bold;
    }

    footer {
        padding: 20px;
        line-height: 2;
        text-align: center;
        font-weight: 500;
    }
</style>
</head>

<body>

<div class="container">

    <header>
        <!-- Ảnh 3 -->
        <img src="anh3.jpg">
        <h1>MỸ DIỆU - 11A6</h1>
    </header>

    <div class="menu">
        <div>Khám phá</div>
        <div>Chia sẻ</div>
        <div>Trải nghiệm</div>
    </div>

    <div class="section">
        <div class="img-box">
            <img src="anh1.jpg" alt="Ảnh 1">
        </div>
        <div class="info">
            Tên: Nguyễn Thị Mỹ Diệu<br>
            Lớp: 11A6<br>
            Trường: THPT số 1 Nguyễn Huệ
        </div>
    </div>

    <div class="section">
        <div class="img-box">
            <img src="anh2.jpg" alt="Ảnh 2">
        </div>
        <div class="info">
            <div class="hobby">Sở thích: Nấu ăn</div>
        </div>
    </div>

    <footer>
        SĐT: 0972381687<br>
        Email: mydieu@gmail.com<br>
        FB: Mỹ Diệu
    </footer>

</div>

</body>
</html>
